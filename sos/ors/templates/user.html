<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% include "header.html" %}
<form action="/ors/save/" method="POST">
  {% csrf_token %}
  <div align="center">
    {% if form.id > 0%}
    <h1>Update User</h1>
    {% else %}
    <h1>Add User</h1>
    {% endif %}
    <h3 font color="green">{{ message }}</h3>
    <table>
      <tr>
        <td><input type="hidden" name="id" value="{{ form.id }}"></td>
      </tr>
      <tr>
        <th>Firstname: </th>
        <td><input type="text" name="firstName"  value="{{ form.firstName }}"></td>
      </tr>
      <tr>
        <th>Lastname: </th>
        <td><input type="text" name="lastName"  value="{{ form.lastName }}"></td>
      </tr>
      <tr>
        <th>LoginID: </th>
        <td><input type="text" name="loginId"  value="{{ form.loginId }}"></td>
      </tr>
      <tr>
        <th>Password: </th>
        <td><input type="text" name="password"  value="{{ form.password }}"></td>
      </tr>
      <tr>
        <th>DOB: </th>
        <td><input type="date" name="dob"  value="{{ form.dob }}"></td>
      </tr>
      <tr>
        <th>Address: </th>
        <td><input type="text" name="address"  value="{{ form.address }}"></td>
      </tr>
      <tr>
        <th></th>
        {% if form.id > 0 %}
        <td><input type="submit" name="operation" value="update"></td>
        {% else %}
        <td><input type="submit" name="operation" value="save"></td>
        {% endif %}
      </tr>
    </table>
  </div>
</form>
</body>
</html>
