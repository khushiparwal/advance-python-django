<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% include "header.html" %}
<form method="post">
    {% csrf_token %}
    <div align="center">
        <h1>Student Registration</h1>
        <table>
            <tr>
                <th>Rollno:</th>
                <td><input type="text" name="rollno"></td>
            </tr>
            <tr>
                <th>Name:</th>
                <td><input type="text" name="name"></td>
            </tr>
            <tr>
                <th>Physics:</th>
                <td><input type="text" name="physics"></td>
            </tr>
            <tr>
                <th>Chemistry:</th>
                <td><input type="text" name="chemistry"></td>
            </tr>
            <tr>
                <th>Maths:</th>
                <td><input type="text" name="maths"></td>
            </tr>
            <tr>
                <th></th>
                <td><input type="submit" name="operation" value="Register"></td>
            </tr>
        </table>
    </div>
</form>
</body>
</html>
